name: Request to join Mod 3-Explorers
description: Request access to Mod 3-Explorers team
title: "Join request: @<your-username>"
labels: ["join-mod3"]
body:
  - type: markdown
    attributes:
      value: |
        **Welcome!**  
        Please fill out this short form to join Module 3-Explorers.  
        **Note:** This issue is public — only share your GitHub username.
        You’ll receive an invite to the email you used to signup for github automatically once approved.

  - type: input
    id: ghuser
    attributes:
      label: Your GitHub username
      description: "Example: octocat (no @)"
      placeholder: "octocat"
    validations:
      required: true

